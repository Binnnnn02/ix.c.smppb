<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Halaman Dalam Pengembangan</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
    padding:20px;
}

.container{
    max-width:700px;
    width:100%;
    text-align:center;
}

.card{
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

.badge{
    display:inline-block;
    background:#f59e0b;
    color:black;
    padding:8px 16px;
    border-radius:999px;
    font-weight:bold;
    margin-bottom:20px;
}

h1{
    margin-bottom:15px;
    font-size:2.5rem;
}

p{
    color:#cbd5e1;
    line-height:1.7;
}

#countdown{
    margin:25px 0;
    font-size:1.8rem;
    font-weight:bold;
    color:#38bdf8;
}

.btn{
    display:inline-block;
    margin-top:25px;
    padding:12px 24px;
    background:#38bdf8;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-2px);
    opacity:.9;
}

.footer{
    margin-top:20px;
    font-size:.9rem;
    color:#94a3b8;
}
</style>
</head>
<body>

<div class="container">
    <div class="card">

        <div class="badge">🚧 Dalam Pengembangan</div>

        <h1>Halaman Sedang Dikerjakan</h1>

        <p>
            Halaman yang Anda tuju saat ini masih dalam tahap pengembangan.
            Beberapa fitur mungkin belum tersedia atau masih dalam proses penyempurnaan.
        </p>

        <div id="countdown">Memuat...</div>

        <p>
            Perkiraan selesai:
            <br>
            <strong>10 Juni 2026 • 10:00 WIB</strong>
        </p>

        <a href="/" class="btn"> <-Kembali ke Beranda</a>

        <div class="footer">
            Terima kasih atas kesabarannya.
        </div>

    </div>
</div>

<script>
const targetDate = new Date("2026-06-10T10:00:00+07:00");

function updateCountdown(){
    const now = new Date();
    const diff = targetDate - now;

    if(diff <= 0){
        document.getElementById("countdown").innerHTML =
            "✅ Halaman seharusnya sudah tersedia";
        return;
    }

    const days = Math.floor(diff / (1000 * 60 * 60 * 24));
    const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((diff / (1000 * 60)) % 60);
    const seconds = Math.floor((diff / 1000) % 60);

    document.getElementById("countdown").innerHTML =
        `${days} Hari ${hours} Jam ${minutes} Menit ${seconds} Detik`;
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
