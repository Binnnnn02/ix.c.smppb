<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Admin — IX-C SMP Permata Bunda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #FF6B9D;
            --dark: #2d2d2d;
            --gray: #888;
            --bg: #f8f9fc;
            --card: #ffffff;
            --border: #ebebeb;
            --danger: #e53935;
        }

        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--dark); min-height: 100vh; }

        /* ── Sidebar ── */
        .layout { display: flex; min-height: 100vh; }

        .sidebar {
            width: 240px;
            background: white;
            border-right: 1px solid var(--border);
            padding: 2rem 1.2rem;
            position: fixed;
            top: 0; left: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            z-index: 100;
        }

        .sidebar-logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--dark);
            margin-bottom: 1.8rem;
            padding-left: 0.5rem;
        }

        .sidebar-logo span {
            background: linear-gradient(135deg, var(--primary), #b06cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--gray);
            transition: all 0.2s;
            border: none;
            background: none;
            width: 100%;
            text-align: left;
            text-decoration: none;
        }

        .nav-item:hover { background: #fdf0f5; color: var(--primary); }
        .nav-item.active { background: linear-gradient(135deg, #fff0f6, #f5f0ff); color: var(--primary); font-weight: 700; }

        .sidebar-spacer { flex: 1; }

        .btn-logout {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--danger);
            border: 1px solid #ffcdd2;
            background: white;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-logout:hover { background: #ffebee; }

        /* ── Main ── */
        .main { margin-left: 240px; padding: 2rem 2.5rem; flex: 1; }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .topbar h2 { font-family: 'Playfair Display', serif; font-size: 1.8rem; }

        /* ── Panels ── */
        .panel { display: none; }
        .panel.active { display: block; }

        /* ── Cards ── */
        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 1.8rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            margin-bottom: 1.5rem;
        }

        .card h3 {
            font-size: 1.05rem;
            margin-bottom: 1.4rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* ── Form fields ── */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        @media (max-width: 600px) { .form-row { grid-template-columns: 1fr; } }

        .field { margin-bottom: 1rem; }

        label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
            color: #555;
        }

        input[type="text"],
        input[type="date"],
        input[type="url"],
        select,
        textarea {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9rem;
            color: var(--dark);
            outline: none;
            transition: border-color 0.2s;
            background: white;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255,107,157,0.1);
        }

        textarea { resize: vertical; min-height: 80px; }

        /* Image upload area */
        .upload-area {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #fafafa;
            position: relative;
        }

        .upload-area:hover, .upload-area.dragover { border-color: var(--primary); background: #fff5f8; }

        .upload-area input[type="file"] {
            position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
        }

        .upload-preview {
            width: 100%;
            aspect-ratio: 16/9;
            object-fit: cover;
            border-radius: 8px;
            margin-top: 0.8rem;
            display: none;
        }

        .upload-progress {
            margin-top: 0.8rem;
            height: 6px;
            background: #f0f0f0;
            border-radius: 3px;
            overflow: hidden;
            display: none;
        }

        .upload-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #b06cff);
            border-radius: 3px;
            transition: width 0.3s;
            width: 0%;
        }

        /* Buttons */
        .btn {
            padding: 0.75rem 1.6rem;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #b06cff);
            color: white;
        }

        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255,107,157,0.35); }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

        .btn-danger { background: #ffebee; color: var(--danger); }
        .btn-danger:hover { background: #ffcdd2; }

        /* Table */
        .table-wrap { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.88rem;
        }

        th {
            text-align: left;
            padding: 0.7rem 1rem;
            background: #fafafa;
            font-weight: 700;
            color: #555;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 0.85rem 1rem;
            border-bottom: 1px solid var(--border);
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }
        tr:hover td { background: #fdf5f8; }

        .thumb {
            width: 64px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
            background: #f0f0f0;
        }

        .emoji-thumb {
            width: 64px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border-radius: 6px;
        }

        .badge-cat {
            display: inline-block;
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            background: #ffeaf4;
            color: var(--primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: #2d2d2d;
            color: white;
            padding: 0.9rem 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.25);
            z-index: 9999;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: #2e7d32; }
        .toast.error   { background: var(--danger); }

        /* Mobile sidebar toggle */
        .menu-toggle {
            display: none;
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 0.5rem 0.75rem;
            cursor: pointer;
            font-size: 1.2rem;
        }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: transform 0.3s; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; padding: 1.5rem 1rem; }
            .menu-toggle { display: block; }
        }
    </style>
</head>
<body>

<div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-logo">IX-C <span>Admin</span></div>

        <button class="nav-item active" data-panel="galeri">🖼️ Galeri</button>
        <button class="nav-item" data-panel="agenda">📅 Agenda</button>
        <a href="galeri.html" class="nav-item" target="_blank">🌐 Lihat Website</a>

        <div class="sidebar-spacer"></div>
        <button class="btn-logout" id="btnLogout">🚪 Keluar</button>
    </aside>

    <!-- Main -->
    <main class="main">
        <div class="topbar">
            <div style="display:flex;align-items:center;gap:1rem">
                <button class="menu-toggle" id="menuToggle">☰</button>
                <h2 id="panelTitle">Kelola Galeri</h2>
            </div>
            <span id="adminEmail" style="font-size:0.82rem;color:var(--gray)"></span>
        </div>

        <!-- ── PANEL: Galeri ── -->
        <div class="panel active" id="panel-galeri">

            <!-- Add form -->
            <div class="card">
                <h3>➕ Tambah Foto Galeri</h3>

                <div class="form-row">
                    <div class="field">
                        <label>Judul Foto *</label>
                        <input type="text" id="g-title" placeholder="Contoh: Turnamen Futsal 2025" maxlength="120">
                    </div>
                    <div class="field">
                        <label>Kategori *</label>
                        <select id="g-category">
                            <option value="">— Pilih kategori —</option>
                            <option value="kelas">📚 Kelas & Belajar</option>
                            <option value="acara">🎊 Acara</option>
                            <option value="olahraga">🏃 Olahraga</option>
                            <option value="ekstrakurikuler">🎭 Ekstrakurikuler</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="field">
                        <label>Tanggal *</label>
                        <input type="date" id="g-date">
                    </div>
                    <div class="field">
                        <label>Link Google Drive (opsional)</label>
                        <input type="url" id="g-drive" placeholder="https://drive.google.com/...">
                    </div>
                </div>

                <div class="field">
                    <label>Upload Foto (landscape, maks 5 MB)</label>
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="g-file" accept="image/*">
                        <div id="uploadPrompt">
                            <div style="font-size:2rem;margin-bottom:0.5rem">📸</div>
                            <div style="font-weight:600;margin-bottom:0.3rem">Klik atau drag & drop foto di sini</div>
                            <div style="font-size:0.8rem;color:var(--gray)">JPG, PNG, WEBP — maks 5 MB</div>
                        </div>
                        <img id="uploadPreview" class="upload-preview" alt="Preview">
                        <div class="upload-progress" id="uploadProgress">
                            <div class="upload-progress-bar" id="uploadProgressBar"></div>
                        </div>
                    </div>
                </div>

                <button class="btn btn-primary" id="btnAddGallery">Simpan Foto</button>
            </div>

            <!-- List -->
            <div class="card">
                <h3>🗂️ Daftar Foto</h3>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Foto</th>
                                <th>Judul</th>
                                <th>Kategori</th>
                                <th>Tanggal</th>
                                <th>Drive</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="galleryTableBody">
                            <tr><td colspan="6" style="text-align:center;color:var(--gray);padding:2rem">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- ── PANEL: Agenda ── -->
        <div class="panel" id="panel-agenda">

            <div class="card">
                <h3>➕ Tambah Agenda</h3>

                <div class="form-row">
                    <div class="field">
                        <label>Judul Agenda *</label>
                        <input type="text" id="a-title" placeholder="Contoh: UTS Semester Genap" maxlength="150">
                    </div>
                    <div class="field">
                        <label>Tanggal *</label>
                        <input type="date" id="a-date">
                    </div>
                </div>

                <div class="field">
                    <label>Keterangan</label>
                    <textarea id="a-desc" placeholder="Deskripsi singkat agenda..."></textarea>
                </div>

                <div class="form-row">
                    <div class="field">
                        <label>Emoji (opsional)</label>
                        <input type="text" id="a-emoji" placeholder="📝" maxlength="4">
                    </div>
                    <div class="field">
                        <label>Kategori</label>
                        <select id="a-category">
                            <option value="akademik">📚 Akademik</option>
                            <option value="acara">🎉 Acara</option>
                            <option value="olahraga">🏃 Olahraga</option>
                            <option value="lainnya">📌 Lainnya</option>
                        </select>
                    </div>
                </div>

                <button class="btn btn-primary" id="btnAddAgenda">Simpan Agenda</button>
            </div>

            <div class="card">
                <h3>📋 Daftar Agenda</h3>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Emoji</th>
                                <th>Judul</th>
                                <th>Tanggal</th>
                                <th>Kategori</th>
                                <th>Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="agendaTableBody">
                            <tr><td colspan="5" style="text-align:center;color:var(--gray);padding:2rem">Memuat data...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import { auth, db, storage } from './firebase-config.js';
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import {
    collection, addDoc, getDocs, deleteDoc, doc,
    query, orderBy, serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import {
    ref, uploadBytesResumable, getDownloadURL, deleteObject
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-storage.js";

// ── Auth guard ────────────────────────────────────────────────────
onAuthStateChanged(auth, user => {
    if (!user) {
        window.location.href = 'admin.html';
        return;
    }
    document.getElementById('adminEmail').textContent = user.email;
    loadGallery();
    loadAgenda();
});

document.getElementById('btnLogout').addEventListener('click', async () => {
    await signOut(auth);
    window.location.href = 'admin.html';
});

// ── Toast ─────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `toast ${type} show`;
    setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Sidebar nav ───────────────────────────────────────────────────
const navItems = document.querySelectorAll('.nav-item[data-panel]');
const panelTitle = document.getElementById('panelTitle');
const titles = { galeri: 'Kelola Galeri', agenda: 'Kelola Agenda' };

navItems.forEach(btn => {
    btn.addEventListener('click', () => {
        navItems.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const p = btn.dataset.panel;
        document.querySelectorAll('.panel').forEach(el => el.classList.remove('active'));
        document.getElementById(`panel-${p}`).classList.add('active');
        panelTitle.textContent = titles[p] || p;
    });
});

// Mobile sidebar
document.getElementById('menuToggle').addEventListener('click', () => {
    document.getElementById('sidebar').classList.toggle('open');
});

// ── Sanitize (XSS prevention on output) ──────────────────────────
function esc(str = '') {
    const d = document.createElement('div');
    d.textContent = String(str);
    return d.innerHTML;
}

// ── Validate Google Drive URL ─────────────────────────────────────
function isValidDriveUrl(url) {
    if (!url) return true; // optional field
    try {
        const u = new URL(url);
        return ['drive.google.com', 'docs.google.com'].includes(u.hostname);
    } catch { return false; }
}

// GALLERY
// ═══════════════════════════════════════════════════════════════════

const preview     = document.getElementById('uploadPreview');
const uploadPrompt = document.getElementById('uploadPrompt');
