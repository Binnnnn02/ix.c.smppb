<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — IX-C SMP Permata Bunda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --primary: #FF6B9D;
            --accent:  #FF6B9D;
            --dark:    #2d2d2d;
            --gray:    #888;
        }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #ffeaf2 0%, #f0f4ff 100%);
            padding: 1rem;
        }

        .login-card {
            background: white;
            border-radius: 24px;
            padding: 3rem 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(255, 107, 157, 0.15);
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-logo .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary), #b06cff);
            border-radius: 18px;
            font-size: 2rem;
            margin-bottom: 1rem;
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.35);
        }

        .login-logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--dark);
        }

        .login-logo p {
            color: var(--gray);
            font-size: 0.9rem;
            margin-top: 0.3rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--dark);
            margin-bottom: 0.4rem;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 0.85rem 1.1rem;
            border: 2px solid #e8e8e8;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.95rem;
            color: var(--dark);
            transition: border-color 0.25s ease, box-shadow 0.25s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(255, 107, 157, 0.12);
        }

        .btn-login {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, var(--primary), #b06cff);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            margin-top: 0.5rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 107, 157, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.65;
            cursor: not-allowed;
            transform: none;
        }

        .error-msg {
            background: #fff0f0;
            border: 1px solid #ffcdd2;
            color: #c62828;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .error-msg.visible { display: block; }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 1.5rem;
            color: var(--gray);
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.2s;
        }

        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>

<div class="login-card">
    <div class="login-logo">
        <div class="badge">🔐</div>
        <h1>Admin Panel</h1>
        <p>IX-C SMP Permata Bunda</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
        <label for="email">Email Admin</label>
        <input type="email" id="email" placeholder="admin@ixcpb.my.id" autocomplete="email">
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin">Masuk</button>

    <a href="index.html" class="back-link">← Kembali ke website</a>
</div>

<script type="module">
import { auth } from '/firebase-config.js';
import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const btnLogin = document.getElementById('btnLogin');
const errorMsg = document.getElementById('errorMsg');

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('visible');
}

btnLogin.addEventListener('click', async () => {
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    errorMsg.classList.remove('visible');

    if (!email || !password) {
        showError('Email dan password wajib diisi.');
        return;
    }

    btnLogin.disabled = true;
    btnLogin.textContent = 'Memproses...';

    try {
        await signInWithEmailAndPassword(auth, email, password);
        window.location.href = 'admindashboard.html';
    } catch (err) {
        // Map Firebase error codes → friendly messages (no raw DB info exposed)
        const map = {
            'auth/user-not-found':    'Email tidak terdaftar.',
            'auth/wrong-password':    'Password salah.',
            'auth/invalid-email':     'Format email tidak valid.',
            'auth/too-many-requests': 'Terlalu banyak percobaan. Coba lagi nanti.',
            'auth/invalid-credential':'Email atau password salah.',
        };
        showError(map[err.code] || 'Terjadi kesalahan. Coba lagi.');
    } finally {
        btnLogin.disabled = false;
        btnLogin.textContent = 'Masuk';
    }
});

// Enter key support
document.addEventListener('keydown', e => {
    if (e.key === 'Enter') btnLogin.click();
});
</script>
</body>
</html>
