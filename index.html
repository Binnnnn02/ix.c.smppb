<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Web Launching</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      font-family: Arial, sans-serif;
      color: #fff;
      padding: 20px;
    }

    .container {
      text-align: center;
      background: rgba(255,255,255,0.1);
      padding: clamp(20px, 5vw, 40px);
      border-radius: 15px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.2);
      width: 100%;
      max-width: 500px;
    }

    h1 {
      font-size: clamp(26px, 6vw, 42px);
      margin-bottom: 10px;
    }

    p {
      font-size: clamp(14px, 3.5vw, 16px);
      opacity: 0.9;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: clamp(10px, 3vw, 20px);
      margin-top: 25px;
      flex-wrap: wrap;
    }

    .box {
      background: rgba(255,255,255,0.15);
      padding: clamp(12px, 3vw, 20px);
      border-radius: 10px;
      perspective: 600px;
      min-width: clamp(70px, 20vw, 90px);
      text-align: center;
      transition: transform 0.3s ease;
    }

    .box:hover {
      transform: scale(1.05);
    }

    .number {
      font-size: clamp(24px, 6vw, 36px);
      font-weight: bold;
      display: block;
      transform-style: preserve-3d;
      transition: transform 0.4s ease-in-out;
    }

    .number.flip {
      transform: rotateX(-180deg);
    }

    .label {
      font-size: clamp(12px, 3vw, 14px);
      opacity: 0.8;
      margin-top: 5px;
      display: block;
    }

    .done {
      margin-top: 20px;
      font-size: clamp(16px, 4vw, 22px);
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.5s ease;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🚀 Web Launching</h1>
  <p>Kami akan segera hadir</p>
  <p>Launching pada <b>21:00</b></p>

  <div class="countdown">
    <div class="box">
      <span id="hours" class="number">00</span>
      <span class="label">Jam</span>
    </div>
    <div class="box">
      <span id="minutes" class="number">00</span>
      <span class="label">Menit</span>
    </div>
    <div class="box">
      <span id="seconds" class="number">00</span>
      <span class="label">Detik</span>
    </div>
  </div>

  <div id="done" class="done"></div>
</div>

<script>
function updateCountdown() {
  const now = new Date();
  const target = new Date();
  target.setHours(21, 00, 0, 0);

  const diff = target - now;

  if (diff <= 0) {
    document.querySelector(".countdown").style.display = "none";
    const done = document.getElementById("done");
    done.innerText = "🎉 Website sudah live!";
    done.style.opacity = "1";
    return;
  }

  const hours = String(Math.floor(diff / (1000 * 60 * 60))).padStart(2, '0');
  const minutes = String(Math.floor((diff / (1000 * 60)) % 60)).padStart(2, '0');
  const seconds = String(Math.floor((diff / 1000) % 60)).padStart(2, '0');

  flipNumber("hours", hours);
  flipNumber("minutes", minutes);
  flipNumber("seconds", seconds);
}

function flipNumber(id, value) {
  const el = document.getElementById(id);
  if (el.innerText !== value) {
    el.classList.add("flip");
    setTimeout(() => {
      el.innerText = value;
      el.classList.remove("flip");
    }, 200);
  }
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
