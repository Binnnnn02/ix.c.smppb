<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Launching Soon</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #1e1e2f, #3a3a4f, #1e1e2f);
      background-size: 600% 600%;
      animation: gradientMove 12s ease infinite;
      font-family: Arial, sans-serif;
      color: white;
      transition: background 1s;
    }

    @keyframes gradientMove {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .container {
      text-align: center;
      background: rgba(0,0,0,0.6);
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
      transition: transform 0.3s ease;
    }

    .container:hover {
      transform: scale(1.03);
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
      color: #ff4d4d;
    }

    p {
      opacity: 0.7;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 30px;
    }

    .box {
      background: #222;
      padding: 20px;
      border-radius: 8px;
      min-width: 80px;
      transition: transform 0.3s ease, background 0.3s ease;
    }

    .box:hover {
      background: #333;
      transform: translateY(-5px);
    }

    .number {
      font-size: 32px;
      font-weight: bold;
    }

    .label {
      font-size: 12px;
      opacity: 0.6;
      margin-top: 5px;
    }

    .done {
      margin-top: 20px;
      font-size: 20px;
      color: #00ffcc;
      transition: opacity 0.5s ease;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🚀 Web Launching</h1>
  <p>Kami akan segera hadir</p>
  <p>Launching pada <b>18:30</b></p>

  <div class="countdown">
    <div class="box">
      <div id="hours" class="number">00</div>
      <div class="label">Jam</div>
    </div>
    <div class="box">
      <div id="minutes" class="number">00</div>
      <div class="label">Menit</div>
    </div>
    <div class="box">
      <div id="seconds" class="number">00</div>
      <div class="label">Detik</div>
    </div>
  </div>

  <div id="done" class="done"></div>
</div>

<script>
function updateCountdown() {
  const now = new Date();
  const target = new Date();
  target.setHours(18, 30, 0, 0);

  const diff = target - now;

  if (diff <= 0) {
    document.querySelector(".countdown").style.display = "none";
    const done = document.getElementById("done");
    done.innerText = "🎉 Website sudah live!";
    done.style.opacity = "1";
    return;
  }

  const hours = Math.floor(diff / (1000 * 60 * 60));
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  document.getElementById("hours").innerText = String(hours).padStart(2, '0');
  document.getElementById("minutes").innerText = String(minutes).padStart(2, '0');
  document.getElementById("seconds").innerText = String(seconds).padStart(2, '0');
}

setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
